<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>TIS Enrollment Dashboard</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<!-- HEADER -->
<div class="header">

    <div style="display:flex;align-items:center;gap:15px;">

        <!-- Uncomment after adding logo -->
        <!--
        <img src="assets/tis-logo.png"
             alt="TIS Logo"
             style="height:50px;">
        -->

        <h1>TIS Enrollment Dashboard</h1>

    </div>

</div>

<div class="container">

    <!-- KPI CARDS -->
    <div class="kpi-container">

        <div class="kpi-card">
            <h3>Total Revenue</h3>
            <div id="totalRevenue">₹0</div>
        </div>

        <div class="kpi-card">
            <h3>Total Enrolments</h3>
            <div id="totalStudents">0</div>
        </div>

        <div class="kpi-card">
            <h3>Avg Revenue / Student</h3>
            <div id="avgRevenue">₹0</div>
        </div>

    </div>

    <!-- MONTHLY CHART -->
    <div class="chart-card">

        <h3>Monthly Enrolments</h3>

        <canvas id="monthlyChart"></canvas>

    </div>

    <!-- SEARCH -->
    <div class="filters">

        <input
            type="text"
            id="searchStudent"
            placeholder="Search Student..."
            style="padding:8px;width:300px;"
        >

    </div>

    <!-- BREADCRUMB -->
    <div
        id="breadcrumb"
        style="
            margin:15px 0;
            font-weight:bold;
            cursor:pointer;
        ">
        Home
    </div>

    <!-- DATA TABLE -->
    <table>

        <thead id="tableHead">
        </thead>

        <tbody id="tableBody">
        </tbody>

    </table>

</div>

<script src="js/app.js"></script>

</body>
</html>
