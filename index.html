<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TIS Management Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header class="top-header">
  <div>
    <h1>TIS Management<br>Dashboard</h1>
    <p id="summaryText">Loading...</p>
  </div>

  <div class="header-right">
    <span id="updatedAt">Updated now</span>
    <button onclick="refreshDashboard()">↻ Refresh</button>
  </div>
</header>

<nav class="tabs">
  <button class="active">FY27 Enrolments</button>
  <button onclick="goToStudents()">Student Details</button>
</nav>

<main class="container">

  <section class="kpi-grid">

    <div class="kpi-card">
      <h3>Total Revenue</h3>
      <div id="totalRevenue" class="big">₹0</div>

      <hr>

      <div class="split">
        <span>Existing<br><b id="existingRevenue">₹0</b></span>
        <span>New<br><b class="green" id="newRevenue">₹0</b></span>
      </div>
    </div>

    <div class="kpi-card">
      <h3>Total Enrolments</h3>
      <div id="totalStudents" class="big">0</div>

      <hr>

      <div class="split">
        <span>Existing<br><b id="existingCount">0</b></span>
        <span>New<br><b class="green" id="newCount">0</b></span>
      </div>
    </div>

    <div class="kpi-card small">
      <h3>Avg Revenue / Student</h3>
      <div id="avgRevenue" class="blue big-small">₹0</div>
      <p>Across all programmes</p>
    </div>

    <div class="kpi-card small">
      <h3>New Enrolment Share</h3>
      <div id="newShare" class="green big-small">0%</div>
      <p id="newShareText">0 of 0 students</p>
    </div>

  </section>

  <section class="chart-card">
    <h3>Enrolments by Month</h3>
    <canvas id="monthlyChart"></canvas>
  </section>

  <!--<section class="chart-card">
    <h3>Revenue by Category</h3>
    <canvas id="categoryChart"></canvas>
  </section>-->

  <section class="breakdown-header">
    <h2>Programme Breakdown</h2>
    <p id="breadcrumb">Tap category → course → students</p>
  </section>

  <section id="listContainer" class="list-container"></section>

</main>

<script src="js/app.js"></script>
</body>
</html>
