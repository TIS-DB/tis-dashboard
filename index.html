<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">

<title>TIS Enrollment Dashboard</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="header">
    <h1>TIS Enrollment Dashboard</h1>
</div>

<div class="container">

    <div class="kpi-container">

    <div class="kpi-card">
        <h3>Total Revenue</h3>
        <div id="totalRevenue">₹0</div>
    </div>

    <div class="kpi-card">
        <h3>Existing Revenue</h3>
        <div id="existingRevenue">₹0</div>
    </div>

    <div class="kpi-card">
        <h3>New Revenue</h3>
        <div id="newRevenue">₹0</div>
    </div>

    <div class="kpi-card">
        <h3>Total Enrolments</h3>
        <div id="totalStudents">0</div>
    </div>

    <div class="kpi-card">
        <h3>Existing Students</h3>
        <div id="existingStudents">0</div>
    </div>

    <div class="kpi-card">
        <h3>New Students</h3>
        <div id="newStudents">0</div>
    </div>

    <div class="kpi-card">
        <h3>Avg Revenue / Student</h3>
        <div id="avgRevenue">₹0</div>
    </div>

    <div class="kpi-card">
        <h3>New Enrolment Share</h3>
        <div id="newShare">0%</div>
    </div>

</div>

    <div class="filters">

        <input
            type="text"
            id="searchStudent"
            placeholder="Search Student"
            style="padding:8px;width:300px;"
        >

    </div>
    <div id="breadcrumb" style="margin:10px 0; font-weight:bold;"></div>

    <table>

    <thead>

<tr>
    <th>Student</th>
    <th>Course</th>
    <th>Category</th>
    <th>Type</th>
    <th>Enrolment Date</th>
    <th>Fee</th>
</tr>

</thead>

        <tbody id="tableBody">

        </tbody>

    </table>

</div>

<script src="js/app.js"></script>

</body>

</html>
