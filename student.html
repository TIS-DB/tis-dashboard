<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Dashboard</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/student.css">
</head>

<body>

<header class="top-header dark-header">
  <div>
    <h1>TIS Management<br>Dashboard</h1>
    <p id="dashboardSummary">Loading...</p>
  </div>

  <div class="header-right">
    <div id="updatedTime">Updated --</div>
    <button onclick="refreshStudents()">↻ Refresh</button>
  </div>
</header>

<nav class="tabs">
  <button onclick="goToFY27()">FY27 Enrolments</button>
  <button onclick="goToFY26()">FY26 Enrolments</button>
  <button class="active">Student Details</button>
</nav>

<main class="student-page">

  <div class="search-box">
    <span>🔍</span>
    <input id="search" type="text" placeholder="Search student name..." />
    <button id="clearSearch">×</button>
  </div>

  <section id="studentPanel"></section>

</main>

<script src="js/student.js"></script>

</body>
</html>
